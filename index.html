<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ảnh chạy vòng tròn</title>

<style>
body{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:sans-serif;
}

#circle{
    position:relative;
    width:400px;
    height:400px;
    border-radius:50%;
    margin:50px;
    animation:spin 20s linear infinite;
}

img{
    width:80px;
    height:80px;
    border-radius:50%;
    position:absolute;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}
</style>

</head>
<body>

<h2>Ảnh chạy vòng vòng</h2>

<input type="file" id="upload" multiple>

<div id="circle"></div>

<script>

const circle = document.getElementById("circle");
const upload = document.getElementById("upload");

let images = [];

upload.addEventListener("change", function(e){

    for(let file of e.target.files){

        let url = URL.createObjectURL(file);

        images.push(url);
    }

    renderImages();
});


function renderImages(){

    circle.innerHTML = "";

    const n = images.length;
    const radius = 150;

    images.forEach((src,i)=>{

        let img = document.createElement("img");
        img.src = src;

        let angle = (2*Math.PI*i)/n;

        let x = 200 + radius*Math.cos(angle) - 40;
        let y = 200 + radius*Math.sin(angle) - 40;

        img.style.left = x + "px";
        img.style.top = y + "px";

        circle.appendChild(img);
    });

}

</script>

</body>
</html>
